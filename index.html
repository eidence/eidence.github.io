<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inkdrop Interactive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #00B2BC;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 600px;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }
        .tagline {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 3rem;
        }
        .games {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
        }
        .games h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        .game-name {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        .game-desc {
            opacity: 0.9;
            margin-bottom: 1rem;
        }
        .footer-links {
            margin-top: 2rem;
            font-size: 0.95rem;
            opacity: 0.85;
        }
        .footer-links a {
            color: #fff;
            text-decoration: underline;
            margin: 0 0.5rem;
        }
        .footer-links a:hover {
            opacity: 1;
            text-decoration: none;
        }
        .copyright {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Inkdrop Interactive</h1>
        <p class="tagline">A small indie studio crafting colourful, casual games.</p>

        <div class="games">
            <h2>Our Games</h2>
            <div class="game-name">Beanville</div>
            <p class="game-desc">
                A physics-based puzzle adventure. Match colourful beans, trigger chain reactions,
                and save Beanville from the jellybean monster.
            </p>
        </div>

        <div class="footer-links">
            <a href="https://sites.google.com/view/beanville/home">Privacy Policy</a>
            <span>•</span>
            <a href="mailto:beanville.contact@gmail.com">Contact</a>
        </div>

        <p class="copyright">© 2026 Inkdrop Interactive</p>
    </div>
</body>
</html>
